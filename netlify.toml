# Netlify configuration for the TB triage research preview.
# Frontend-only (Vite + React, BYOK). No server-side functions; all API calls are
# from the browser via the user's own keys, with one exception: Replicate's REST API
# does not send CORS headers, so it is proxied through Netlify (same-origin rewrite).

[build]
  command = "npm run build"
  publish = "dist"

# --- Redirects (order matters: more specific MUST come before the SPA catchall) ---

# Replicate REST API proxy. The vite dev proxy at /replicate/* is mirrored here so the
# provider code (src/lib/providers/replicate.ts) uses the same base URL in dev and prod.
# Authorization: Bearer <user-pasted-token> is forwarded by the rewrite.
[[redirects]]
  from = "/replicate/*"
  to = "https://api.replicate.com/:splat"
  status = 200
  force = true

# SPA catchall for react-router-dom BrowserRouter. Without this, deep links 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# --- Headers ---

# Never cache the SPA shell — re-deploys must take effect immediately so users get
# fresh asset hashes referenced by the latest index.html.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
